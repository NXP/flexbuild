# [general]
machine=la1224rdb_revc

# [firmware_images]
rcw_xspi="bsp/rcw/la1224rdb_revc/IGGFF_PP_NNNN_RN_18_14_2/rcw_2200_700_2600_18_14_2.bin"
rcw_sd="bsp/rcw/la1224rdb_revc/IGGFF_PP_NNNN_RN_18_14_2/rcw_2200_700_2600_18_14_2.bin"
rcw_emmc="bsp/rcw/la1224rdb_revc/IGGFF_PP_NNNN_RN_18_14_2/rcw_2200_700_2600_18_14_2.bin"

device_tree="linux/kernel/arm64/LS/fsl-la1224-rdb-revc.dtb"

BOOT_TYPE="sd xspi emmc"
BOOTLOADER_TYPE="uboot"

UBOOT_CONFIG="la1224rdb_tfa_defconfig la1224rdb_tfa_SECURE_BOOT_defconfig"

# RCW/PBL+BL2 image
COMPOSITE_IMG1_FILE_sd="bsp/atf/la1224rdb_revc/bl2_sd.pbl"
COMPOSITE_IMG1_FILE_sd_sec="bsp/atf/la1224rdb_revc/bl2_sd_sec.pbl"
COMPOSITE_IMG1_FILE_xspi="bsp/atf/la1224rdb_revc/bl2_flexspi_nor.pbl"
COMPOSITE_IMG1_FILE_xspi_sec="bsp/atf/la1224rdb_revc/bl2_flexspi_nor_sec.pbl"
COMPOSITE_IMG1_FILE_emmc="bsp/atf/la1224rdb_revc/bl2_emmc.pbl"

# BL33 fip image
COMPOSITE_IMG2_FILE="bsp/atf/la1224rdb_revc/fip_uboot.bin"
COMPOSITE_IMG2_FILE_sec="bsp/atf/la1224rdb_revc/fip_uboot_sec.bin"

# secure boot headers
COMPOSITE_IMG4_FILE_sd_sec="bsp/secboot_hdrs/la1224rdb/secboot_hdrs_sdboot.bin"
COMPOSITE_IMG4_FILE_xspi_sec="bsp/secboot_hdrs/la1224rdb/secboot_hdrs_xspiboot.bin"

# DDR PHY firmware
COMPOSITE_IMG5_FILE="bsp/ddr_phy_bin/lx2160a/fip_ddr.bin"
COMPOSITE_IMG5_FILE_sec="bsp/atf/la1224rdb_revc/fip_ddr_sec.bin"

# fuse provisioning image
COMPOSITE_IMG6_FILE="bsp/atf/la1224rdb_revc/fuse_fip.bin"
COMPOSITE_IMG6_FILE_sec="bsp/atf/la1224rdb_revc/fuse_fip_sec.bin"

# Ethernet PHY image
COMPOSITE_IMG9_FILE="bsp/phy_inphi/in112525-phy-ucode.txt"

# script for flashing
COMPOSITE_IMG10_FILE="images/flash_images.scr"

# DPAA2-MC image
COMPOSITE_IMG11_FILE="bsp/mc_bin/lx216xa/mc_lx2160a_${MC_FW_VERSION}.itb"

# DPAA2 DPL image
COMPOSITE_IMG12_FILE="bsp/mc_utils/config/lx2160a/LA1224-RDB/dpl-eth.22.dtb"

# DPAA2 DPC image
COMPOSITE_IMG13_FILE="bsp/mc_utils/config/lx2160a/LA1224-RDB/dpc-usxgmii.22.dtb"

# DTB
COMPOSITE_IMG14_FILE="${device_tree}"

# [distro autoboot script]
distro_bootscript="bsp/u-boot/la1224rdb_revc/la1224rdb_boot.scr"
bootscript_dec="bsp/u-boot/la1224rdb_revc/la1224rdb_dec_boot.scr"
bootscript_enforce="bsp/u-boot/la1224rdb_revc/la1224rdb_enforce_boot.scr"

securevalidate="setenv secureboot_validate 'load \$devtype \$devnum:\$devpart_boot \$kernelheader_addr_r /secboot_hdrs/la1224rdb/hdr_linux.out; load \$devtype \$devnum:\$devpart_boot \$fdtheader_addr_r /secboot_hdrs/la1224rdb/hdr_dtb.out; esbc_validate \$kernelheader_addr_r; esbc_validate \$fdtheader_addr_r'"

securevalidate_enc="setenv secureboot_validate 'load \$devtype \$devnum:\$devpart_boot \$kernelheader_addr_r /secboot_hdrs/la1224rdb/hdr_linux.out; esbc_validate \$kernelheader_addr_r;load \$devtype \$devnum:\$devpart_boot \$fdtheader_addr_r /secboot_hdrs/la1224rdb/hdr_dtb.out; esbc_validate \$fdtheader_addr_r; size \$devtype \$devnum:\$devpart_boot \$kernel_image; echo Encapsulating linux image;setenv key_addr 0x87000000; mw \$key_addr $key_id_1;setexpr key_addr \$key_addr + 0x4; mw \$key_addr $key_id_2;setexpr key_addr \$key_addr + 0x4; mw \$key_addr $key_id_3;setexpr key_addr \$key_addr + 0x4; mw \$key_addr $key_id_4;setenv key_addr 0x87000000;blob enc \$kernel_addr_r \$load_addr \$filesize \$key_addr; setexpr blobsize \$filesize + 0x30;echo Saving encrypted linux ;save \$devtype \$devnum:\$devpart_boot \$load_addr /\$kernel_image \$blobsize;size \$devtype \$devnum:\$devpart_boot \$dtb;echo Encapsulating dtb image; blob enc \$fdt_addr_r \$load_addr \$filesize \$key_addr; setexpr blobsize \$filesize + 0x30;echo Saving encrypted dtb; save \$devtype \$devnum:\$devpart_boot \$load_addr /\$dtb \$blobsize; size \$devtype \$devnum:\$devpart_boot /la1224rdb_dec_boot.scr; load \$devtype \$devnum:\$devpart_boot \$load_addr /la1224rdb_dec_boot.scr; echo replacing Bootscript; save \$devtype \$devnum:\$devpart_boot \$load_addr /la1224rdb_boot.scr \$filesize;size \$devtype \$devnum:\$devpart_boot /secboot_hdrs/la1224rdb/hdr_la1224rdb_bs_dec.out; load \$devtype \$devnum:\$devpart_boot \$load_addr /secboot_hdrs/la1224rdb/hdr_la1224rdb_bs_dec.out ;echo Replacing bootscript header; save \$devtype \$devnum:\$devpart_boot \$load_addr /hdr_la1224rdb_bs.out \$filesize;reset;'"

securevalidate_dec="setenv secureboot_validate 'size \$devtype \$devnum:\$devpart_boot \$kernel_image;setexpr imgsize \$filesize - 0x30 ;echo Decapsulating linux image; setenv key_addr 0x87000000; mw \$key_addr $key_id_1;setexpr key_addr \$key_addr + 0x4; mw \$key_addr $key_id_2;setexpr key_addr \$key_addr + 0x4; mw \$key_addr $key_id_3;setexpr key_addr \$key_addr + 0x4; mw \$key_addr $key_id_4; blob dec \$kernel_addr_r \$load_addr \$imgsize \$key_addr; cp.b \$load_addr \$kernel_addr_r \$filesize ;size \$devtype \$devnum:\$devpart_boot \$dtb;setexpr imgsize \$filesize - 0x30 ;echo Decapsulating dtb kernel_image; blob dec \$fdt_addr_r \$load_addr \$imgsize \$key_addr; cp.b \$load_addr \$fdt_addr_r \$filesize ; '"

securevalidate_fix="setenv secureboot_validate 'load \$devtype \$devnum:\$devpart_boot \$kernelheader_addr_r /secboot_hdrs/la1224rdb/hdr_linux.out; esbc_validate \$kernelheader_addr_r;load \$devtype \$devnum:\$devpart_boot \$fdtheader_addr_r /secboot_hdrs/la1224rdb/hdr_dtb.out; esbc_validate \$fdtheader_addr_r; load \$devtype \$devnum:\$devpart_boot \$initramfsheader_addr_r /secboot_hdrs/la1224rdb/hdr_initramfs.out; esbc_validate \$initramfsheader_addr_r; size \$devtype \$devnum:\$devpart_boot /la1224rdb_enforce_boot.scr; load \$devtype \$devnum:\$devpart_boot \$load_addr /la1224rdb_enforce_boot.scr; echo Replacing Bootscript; save \$devtype \$devnum:\$devpart_boot \$load_addr /la1224rdb_boot.scr \$filesize;size \$devtype \$devnum:\$devpart_boot /secboot_hdrs/la1224rdb/hdr_la1224rdb_bs_enf.out; load \$devtype \$devnum:\$devpart_boot \$load_addr /secboot_hdrs/la1224rdb/hdr_la1224rdb_bs_enf.out ;echo Replacing bootscript header; save \$devtype \$devnum:\$devpart_boot \$load_addr /hdr_lx2160ardb_bs.out \$filesize; ' setenv othbootargs 'ima_tcb ima_appraise=fix ima_appraise_tcb evm=fix enforcing=0 '"

securevalidate_enforce="setenv secureboot_validate 'load \$devtype \$devnum:\$devpart_boot \$kernelheader_addr_r /secboot_hdrs/la1224rdb/hdr_linux.out; esbc_validate \$kernelheader_addr_r;load \$devtype \$devnum:\$devpart_boot \$fdtheader_addr_r /secboot_hdrs/la1224rdb/hdr_dtb.out; esbc_validate \$fdtheader_addr_r; load \$devtype \$devnum:\$devpart_boot \$initramfsheader_addr_r /secboot_hdrs/la1224rdb/hdr_initramfs.out; esbc_validate \$initramfsheader_addr_r; ' setenv othbootargs 'ima_tcb ima_appraise=enforce ima_appraise_tcb enforcing=1 '"

distroboot=\
'env exists dtb || setenv dtb fsl-la1224-rdb-revc.dtb;'\
'env exists kernel_image || setenv kernel_image Image;'\
'env exists devpart_boot || setenv devpart_boot 1;'\
'env exists devpart_root || setenv devpart_root 3;'\
'part uuid $devtype $devnum:$devpart_root partuuidr;'\
'setenv bootargs console=ttyAMA0,115200 earlycon=pl011,mmio32,0x21c0000 root=PARTUUID=$partuuidr rw rootwait pci=pcie_bus_perf $othbootargs;'\
'load $devtype $devnum:$devpart_boot $kernel_addr_r $kernel_image;'\
'load $devtype $devnum:$devpart_boot $fdt_addr_r $dtb;'\
'env exists secureboot && echo validating secureboot && run secureboot_validate;'\
'booti $kernel_addr_r - $fdt_addr_r'

distroboot_ima=\
'env exists dtb || setenv dtb fsl-la1224-rdb-revc.dtb;'\
'env exists kernel_image || setenv kernel_image Image;'\
'env exists devpart_boot || setenv devpart_boot 1;'\
'env exists devpart_root || setenv devpart_root 3;'\
'part uuid $devtype $devnum:$devpart_root partuuidr;'\
'load $devtype $devnum:$devpart_boot $kernel_addr_r $kernel_image;'\
'load $devtype $devnum:$devpart_boot $fdt_addr_r $dtb;'\
'setenv initramfs_addr_r 0xb0000000; setenv initramfsheader_addr_r 0x80300000;'\
'load $devtype $devnum:$devpart_boot $initramfs_addr_r initramfs.img;'\
'env exists secureboot && echo validating secureboot && run secureboot_validate;'\
'setenv bootargs console=ttyAMA0,115200 earlycon=pl011,mmio32,0x21c0000 root=PARTUUID=$partuuidr rw rootwait pci=pcie_bus_perf $othbootargs;'\
'booti $kernel_addr_r $initramfs_addr_r $fdt_addr_r'

# [uefi grub config, updated by installer]

# [secure boot scripts in cst]
sd_script=scripts/platforms/lx2160_sd.sh
xspi_script=scripts/platforms/lx2160_xspi.sh
